name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least-privilege default: no job needs write access to anything (no PR
# comments, no releases, no package publishing). Grant more narrowly on a
# per-job basis if a future job needs it, rather than widening this.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run fast focused test (no dependencies)
        run: python tests/test_berserk_mcp.py
      - name: Run full test suite (no dependencies)
        run: python -m unittest discover -s tests
      - name: Build the package
        run: |
          python -m pip install --upgrade pip build
          python -m build
